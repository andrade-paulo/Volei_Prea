spring.application.name=api

# Conexão interna do Docker (Garanta que credenciais batam com seu docker-compose.yml)
spring.datasource.url=jdbc:postgresql://db:5433/voleiprea
spring.datasource.username=postgres
spring.datasource.password=sua_senha

# O motor do Hibernate: 'update' cria as tabelas se não existirem e altera colunas novas
spring.jpa.hibernate.ddl-auto=update

# Exposição e formatação dos logs (Crítico para debug neste estágio)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true